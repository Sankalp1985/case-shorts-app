<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortsFeed | Insights in Seconds</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { background:#050505;color:#fff;margin:0;overflow:hidden;font-family:Inter,sans-serif;}
.feed-container {height:100vh;scroll-snap-type:y mandatory;overflow-y:scroll;}
.feed-container::-webkit-scrollbar{display:none;}
.card{height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;}
.image-container{height:55%;overflow:hidden;}
.content-container{height:45%;background:#fff;color:#111;padding:2rem;border-radius:30px;margin-top:-40px;}
.action-bar{position:absolute;bottom:0;left:0;right:0;padding:1rem;background:#fff;display:flex;justify-content:space-between;}
#analytics-panel{position:fixed;inset:0;background:#000;transform:translateY(100%);transition:0.4s;}
#analytics-panel.open{transform:translateY(0);}
</style>
</head>

<body>

<div class="feed-container" id="feed">
    <div class="h-full flex items-center justify-center text-gray-500">Loading...</div>
</div>

<div id="analytics-panel">
    <button onclick="toggleAnalytics()">Close</button>
    <div id="stats-list"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwMenWKEzLlrJ5T-pjs8H8SKdMaQY9D98vFZQMAQSOkV7flfHi9lCIbbmt9spAHoDpYQQ/exec";
const API_KEY = "abc1991securekey";

// LOAD FEED
async function loadFeed() {
    try {
        const res = await fetch(SCRIPT_URL);
        const json = await res.json();

        console.log("API response:", json);

        const data = json.data || json; // supports both formats

        renderStories(data);
        observeCards();

    } catch (e) {
        console.error("Load error:", e);
        document.getElementById("feed").innerHTML = "Error: " + e.message;
    }
}

// RENDER
function renderStories(stories) {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    stories.forEach(story => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = story.id;

        card.innerHTML = `
            <div class="image-container">
                <img src="${story.image_url}" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <div class="content-container">
                <h2>${story.title}</h2>
                <p>${story.content}</p>

                <div class="action-bar">
                    <button onclick="like('${story.id}')">
                        ❤️ <span id="like-${story.id}">${story.likes || 0}</span>
                    </button>
                    <button onclick="share('${story.title}')">Share</button>
                </div>
            </div>
        `;
        feed.appendChild(card);
    });
}

// OBSERVER (track opens)
function observeCards() {
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                sendAnalytics(e.target.dataset.id, "open");
            }
        });
    }, { threshold: 0.7 });

    document.querySelectorAll(".card").forEach(c => observer.observe(c));
}

// LIKE
function like(id) {
    const el = document.getElementById("like-" + id);
    let current = parseInt(el.innerText) || 0;
    el.innerText = current + 1;

    sendAnalytics(id, "like");
}

// SEND ANALYTICS
function sendAnalytics(id, type) {
    fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            type: type,
            apiKey: API_KEY
        })
    }).catch(err => console.error("POST failed:", err));
}

// ANALYTICS PANEL
function toggleAnalytics() {
    const panel = document.getElementById("analytics-panel");
    panel.classList.toggle("open");
    if (panel.classList.contains("open")) loadStats();
}

// FETCH STATS
async function loadStats() {
    const box = document.getElementById("stats-list");
    box.innerHTML = "Loading...";

    try {
        const res = await fetch(SCRIPT_URL + "?action=getStats");
        const json = await res.json();

        console.log("Stats response:", json);

        const data = json.data || json;

        box.innerHTML = data.map((s,i)=>`
            <div>
                ${i+1}. ${s.title} (${s.opens})
            </div>
        `).join("");

    } catch (e) {
        console.error("Stats error:", e);
        box.innerHTML = "Failed to load stats";
    }
}

// SHARE
function share(title) {
    window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(title));
}

window.onload = loadFeed;
</script>

</body>
</html>
