<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortsFeed | Insights in Seconds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            background-color: #0b0b0b; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Snap Container */
        .feed-container {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .image-container {
            height: 50%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .image-container img {
            transition: transform 0.6s ease;
        }

        .card:hover .image-container img {
            transform: scale(1.05);
        }

        .content-container {
            height: 50%;
            padding: 2rem 1.5rem;
            background: #ffffff;
            color: #1a1a1a;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            margin-top: -30px;
            position: relative;
            z-index: 10;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
        }

        .action-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.25rem 1.5rem;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
        }

        /* Analytics Sidebar/Modal */
        #analytics-panel {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }
        #analytics-panel.open { transform: translateY(0); }

        .trending-badge {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
        }
    </style>
</head>
<body>

<div class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-gradient-to-b from-black/70 to-transparent">
    <div class="text-xl font-bold tracking-tighter text-white">SHORTS<span class="text-red-500">FEED</span></div>
    <button onclick="toggleAnalytics()" class="bg-white/20 backdrop-blur-md p-2 px-4 rounded-full text-xs font-bold border border-white/30">
        <i class="fa-solid fa-chart-line mr-2"></i>TRENDING
    </button>
</div>

<div class="feed-container" id="feed">
    <div class="flex flex-col items-center justify-center h-full">
        <div class="w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-400">Fetching the latest...</p>
    </div>
</div>

<div id="analytics-panel" class="fixed inset-0 z-[100] bg-black/90 p-6 flex flex-col">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold">Top Reads <span class="text-red-500">Week 24</span></h2>
        <button onclick="toggleAnalytics()" class="text-3xl">&times;</button>
    </div>
    <div id="stats-list" class="space-y-4 overflow-y-auto">
        <p class="text-gray-500 italic">Calculating trends...</p>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3Bc7hoWUZNeBug0cKwFEwDFf3VZVsa-gWM2aVSUosIUm4a9zkqeZTEeh4ReZga6gi_Q/exec';

    async function loadFeed() {
        try {
            const response = await fetch(SCRIPT_URL, { method: 'GET', redirect: 'follow' });
            const stories = await response.json();
            renderStories(stories);
            setupIntersectionObserver();
        } catch (error) {
            document.getElementById('feed').innerHTML = `<p class="p-10 text-center">Connection Error. Verify Script Deployment.</p>`;
        }
    }

    function renderStories(stories) {
        const feed = document.getElementById('feed');
        feed.innerHTML = ''; 

        stories.forEach((story, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-id', story.id);
            
            card.innerHTML = `
                <div class="image-container">
                    <img src="${story.image_url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                </div>
                <div class="content-container">
                    <span class="trending-badge text-[10px] font-extrabold px-3 py-1 rounded-full text-white uppercase mb-4 inline-block">
                        ${story.category || 'New Update'}
                    </span>
                    <h1 class="text-2xl font-bold leading-tight mb-4 text-gray-900">${story.title}</h1>
                    <div class="h-40 overflow-y-auto pr-2 text-gray-600 leading-relaxed text-sm">
                        ${story.content}
                    </div>
                    
                    <div class="action-bar rounded-b-3xl">
                        <div class="flex space-x-10">
                            <button onclick="handleLike('${story.id}')" class="flex flex-col items-center group">
                                <i id="heart-${story.id}" class="far fa-heart text-xl transition-transform group-active:scale-125"></i>
                                <span id="like-count-${story.id}" class="text-[10px] font-bold text-gray-400 mt-1">${story.likes || 0}</span>
                            </button>
                            <button onclick="handleShare('${story.id}', '${story.title}')" class="flex flex-col items-center">
                                <i class="fa-brands fa-whatsapp text-xl text-green-500"></i>
                                <span class="text-[10px] font-bold text-gray-400 mt-1">SHARE</span>
                            </button>
                        </div>
                        <div class="text-[10px] font-black text-gray-300 tracking-widest uppercase">ID ${story.id}</div>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    // Toggle Analytics Panel
    function toggleAnalytics() {
        const panel = document.getElementById('analytics-panel');
        panel.classList.toggle('open');
        if(panel.classList.contains('open')) fetchStats();
    }

    // Fetch Stats for Top 10
    async function fetchStats() {
        const statsList = document.getElementById('stats-list');
        try {
            const response = await fetch(SCRIPT_URL + '?action=getStats');
            const data = await response.json();
            
            statsList.innerHTML = data.slice(0, 10).map((item, idx) => `
                <div class="flex justify-between items-center bg-white/10 p-4 rounded-xl border border-white/5">
                    <div class="flex items-center space-x-4">
                        <span class="text-xl font-black text-red-500 w-6">#${idx + 1}</span>
                        <div>
                            <div class="font-bold text-sm">${item.title}</div>
                            <div class="text-[10px] text-gray-500 uppercase">${item.id}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-bold text-white">${item.opens}</div>
                        <div class="text-[9px] text-gray-500 uppercase">Reads</div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            statsList.innerHTML = '<p class="text-red-500">Could not sync analytics.</p>';
        }
    }

    // The rest of your logic (Observer, Like, Analytics Update)
    function setupIntersectionObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    updateAnalytics(entry.target.getAttribute('data-id'), 'open');
                }
            });
        }, { threshold: 0.8 });
        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    }

    function handleLike(id) {
        const heart = document.getElementById(`heart-${id}`);
        const countSpan = document.getElementById(`like-count-${id}`);
        heart.classList.toggle('fas');
        heart.classList.toggle('text-red-500');
        let likes = parseInt(countSpan.innerText);
        countSpan.innerText = heart.classList.contains('fas') ? likes + 1 : likes - 1;
        updateAnalytics(id, 'like');
    }

    function updateAnalytics(id, type) {
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ id: id, type: type })
        });
    }

    async function handleShare(id, title) {
        if (navigator.share) {
            navigator.share({ title, text: `Read: ${title}`, url: window.location.href });
        } else {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title + " " + window.location.href)}`);
        }
    }

    window.onload = loadFeed;
</script>
</body>
</html>
