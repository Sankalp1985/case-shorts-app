<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortsFeed | Insights in Seconds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Snap Container */
        .feed-container {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .image-container {
            height: 55%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .image-container img {
            transition: transform 1.5s cubic-bezier(0, 0, 0.2, 1);
        }

        .content-container {
            height: 45%;
            padding: 2.5rem 1.75rem;
            background: linear-gradient(to bottom, #ffffff 0%, #f9f9f9 100%);
            color: #111;
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            margin-top: -40px;
            position: relative;
            z-index: 10;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.4);
        }

        .action-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* Analytics Panel Design */
        #analytics-panel {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
        }
        #analytics-panel.open { transform: translateY(0); }

        .trending-badge {
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.2);
        }

        /* Custom Scroll for content */
        .content-scroll::-webkit-scrollbar { width: 4px; }
        .content-scroll::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
    </style>
</head>
<body>

<div class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-gradient-to-b from-black/80 via-black/40 to-transparent">
    <div class="flex items-center space-x-2">
        <div class="w-2 h-8 bg-red-600 rounded-full"></div>
        <div class="text-2xl font-black tracking-tighter text-white">CASE<span class="text-red-600">SHORTS</span></div>
    </div>
    <button onclick="toggleAnalytics()" class="group flex items-center space-x-2 bg-white/10 hover:bg-white/20 backdrop-blur-xl p-2 px-5 rounded-full text-[10px] font-black tracking-widest border border-white/20 transition-all">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-600"></span>
        </span>
        <span>TRENDING</span>
    </button>
</div>

<div class="feed-container" id="feed">
    <div class="flex flex-col items-center justify-center h-full bg-black">
        <div class="w-12 h-12 border-2 border-red-600 border-t-transparent rounded-full animate-spin mb-6"></div>
        <p class="text-xs tracking-[0.3em] font-bold text-gray-500 uppercase">Syncing Intelligence</p>
    </div>
</div>

<div id="analytics-panel" class="fixed inset-0 z-[100] p-8 flex flex-col">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h2 class="text-3xl font-black tracking-tight">Top <span class="text-red-600">Stories</span></h2>
            <p class="text-gray-500 text-xs font-bold mt-1 tracking-widest uppercase">Real-time Engagement</p>
        </div>
        <button onclick="toggleAnalytics()" class="h-12 w-12 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-all">
            <i class="fa-solid fa-xmark text-xl text-white"></i>
        </button>
    </div>
    <div id="stats-list" class="space-y-4 overflow-y-auto pr-2 content-scroll">
        <div class="animate-pulse flex space-x-4 bg-white/5 p-4 rounded-2xl">
            <div class="rounded-full bg-white/10 h-10 w-10"></div>
            <div class="flex-1 space-y-6 py-1">
                <div class="h-2 bg-white/10 rounded"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3Bc7hoWUZNeBug0cKwFEwDFf3VZVsp-gWM2aVSUosIUm4a9zkqeZTEeh4ReZga6gi_Q/exec';

    async function loadFeed() {
        try {
            const response = await fetch(SCRIPT_URL, { method: 'GET', redirect: 'follow' });
            const stories = await response.json();
            renderStories(stories);
            setupIntersectionObserver();
        } catch (error) {
            document.getElementById('feed').innerHTML = `<div class="p-20 text-center text-gray-500 font-bold uppercase tracking-widest">Network Outage<br><span class="text-[10px] font-normal mt-2 block">Check your connection</span></div>`;
        }
    }

    function renderStories(stories) {
        const feed = document.getElementById('feed');
        feed.innerHTML = ''; 

        stories.forEach((story) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-id', story.id);
            
            card.innerHTML = `
                <div class="image-container">
                    <img src="${story.image_url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                </div>
                <div class="content-container">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="trending-badge text-[9px] font-black px-3 py-1 rounded-sm text-white uppercase tracking-[0.2em]">
                            ${story.category || 'EXPLAINER'}
                        </span>
                    </div>
                    <h1 class="text-2xl font-black leading-[1.15] mb-5 text-black tracking-tight">${story.title}</h1>
                    <div class="h-44 overflow-y-auto pr-4 text-gray-700 leading-relaxed text-[15px] font-medium content-scroll">
                        ${story.content}
                    </div>
                    
                    <div class="action-bar border-t border-gray-100">
                        <div class="flex items-center space-x-10">
                            <button onclick="handleLike('${story.id}')" class="flex flex-col items-center group">
                                <i id="heart-${story.id}" class="far fa-heart text-xl transition-all duration-300 group-hover:scale-110"></i>
                                <span id="like-count-${story.id}" class="text-[10px] font-black text-gray-400 mt-1 tracking-tighter">${story.likes || 0}</span>
                            </button>
                            <button onclick="handleShare('${story.id}', '${story.title}')" class="flex flex-col items-center group">
                                <i class="fa-brands fa-whatsapp text-2xl text-green-600 transition-transform group-active:scale-90"></i>
                                <span class="text-[10px] font-black text-gray-400 mt-1 tracking-tighter">SHARE</span>
                            </button>
                        </div>
                        <div class="flex flex-col items-end">
                             <div class="text-[9px] font-black text-gray-300 tracking-[0.2em] uppercase">REFERENCE</div>
                             <div class="text-[11px] font-bold text-gray-400 uppercase">#${story.id}</div>
                        </div>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    function toggleAnalytics() {
        const panel = document.getElementById('analytics-panel');
        panel.classList.toggle('open');
        if(panel.classList.contains('open')) fetchStats();
    }

    async function fetchStats() {
        const statsList = document.getElementById('stats-list');
        try {
            const response = await fetch(SCRIPT_URL + '?action=getStats');
            const data = await response.json();
            
            statsList.innerHTML = data.map((item, idx) => `
                <div class="flex justify-between items-center bg-white/5 hover:bg-white/10 p-5 rounded-2xl border border-white/5 transition-all">
                    <div class="flex items-center space-x-5">
                        <span class="text-2xl font-black text-red-600/50 italic">0${idx + 1}</span>
                        <div>
                            <div class="font-bold text-sm text-white leading-tight mb-1">${item.title}</div>
                            <div class="text-[9px] font-black text-red-500 tracking-widest uppercase">${item.category || 'STORY'}</div>
                        </div>
                    </div>
                    <div class="text-right bg-black/40 px-3 py-1 rounded-lg">
                        <div class="text-xs font-black text-white">${item.opens}</div>
                        <div class="text-[8px] font-bold text-gray-500 uppercase tracking-tighter">READS</div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            statsList.innerHTML = '<p class="text-red-500 font-bold text-center">ANALYTICS SYNC FAILED</p>';
        }
    }

    function setupIntersectionObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    updateAnalytics(entry.target.getAttribute('data-id'), 'open');
                }
            });
        }, { threshold: 0.8 });
        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    }

    function handleLike(id) {
        const heart = document.getElementById(`heart-${id}`);
        const countSpan = document.getElementById(`like-count-${id}`);
        heart.classList.toggle('fas');
        heart.classList.toggle('text-red-600');
        let likes = parseInt(countSpan.innerText);
        countSpan.innerText = heart.classList.contains('fas') ? likes + 1 : likes - 1;
        updateAnalytics(id, 'like');
    }

    function updateAnalytics(id, type) {
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ id: id, type: type })
        });
    }

    async function handleShare(id, title) {
        if (navigator.share) {
            navigator.share({ title, text: `Insight: ${title}`, url: window.location.href });
        } else {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title + " " + window.location.href)}`);
        }
    }

    window.onload = loadFeed;
</script>
</body>
</html>
