<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortsFeed | Insights in Seconds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* The InShorts-style Snap Container */
        .feed-container {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        .feed-container::-webkit-scrollbar { display: none; } /* Hide scrollbar for Chrome/Safari */

        .card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #222;
        }

        .image-container {
            height: 45%;
            width: 100%;
            position: relative;
        }

        .content-container {
            height: 55%;
            padding: 1.5rem;
            background: #fff;
            color: #000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            margin-top: -20px;
            position: relative;
            z-index: 10;
        }

        .action-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.5rem;
            background: #f9f9f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .like-btn.active { color: #e11d48; }
    </style>
</head>
<body>

<div class="feed-container" id="feed">
    <div class="flex items-center justify-center h-full">
        <p class="text-gray-500 animate-pulse">Loading stories...</p>
    </div>
</div>

<script>
    // FIXED: Added the missing closing quote ' at the end
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3Bc7hoWUZNeBug0cKwFEwDFf3VZVsp-gWM2aVSUosIUm4a9zkqeZTEeh4ReZga6gi_Q/exec';

    async function loadFeed() {
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'GET',
                redirect: 'follow' 
            });
            
            if (!response.ok) throw new Error('Network response was not ok');
            
            const stories = await response.json();
            renderStories(stories);
            setupIntersectionObserver();
        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('feed').innerHTML = `<p class="p-10 text-center">Error: ${error.message}</p>`;
        }
    }

    function renderStories(stories) {
        const feed = document.getElementById('feed');
        feed.innerHTML = ''; 

        stories.forEach(story => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-id', story.id);
            
            card.innerHTML = `
                <div class="image-container">
                    <img src="${story.image_url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x600?text=No+Image'">
                    <div class="absolute top-4 left-4">
                        <span class="bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest">
                            ${story.category || 'Updates'}
                        </span>
                    </div>
                </div>
                <div class="content-container shadow-2xl">
                    <h1 class="text-xl font-bold leading-tight mb-3 text-black">${story.title}</h1>
                    <p class="text-gray-600 text-sm leading-relaxed overflow-y-auto h-32">
                        ${story.content}
                    </p>
                    
                    <div class="action-bar">
                        <div class="flex space-x-8">
                            <button onclick="handleLike('${story.id}')" class="flex items-center space-x-2">
                                <i id="heart-${story.id}" class="far fa-heart text-xl text-gray-800"></i>
                                <span id="like-count-${story.id}" class="text-xs font-bold text-gray-500">${story.likes || 0}</span>
                            </button>
                            <button onclick="handleShare('${story.id}', '${story.title}')" class="flex items-center space-x-2">
                                <i class="fa-brands fa-whatsapp text-xl text-green-500"></i>
                                <span class="text-xs font-bold text-gray-500">Share</span>
                            </button>
                        </div>
                        <span class="text-[10px] text-gray-400 font-mono">ID: ${story.id}</span>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    function setupIntersectionObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.getAttribute('data-id');
                    updateAnalytics(id, 'open');
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.card').forEach(card => observer.observe(card));
    }

    function handleLike(id) {
        const heart = document.getElementById(`heart-${id}`);
        const countSpan = document.getElementById(`like-count-${id}`);
        
        heart.classList.toggle('fas');
        heart.classList.toggle('text-red-500');
        
        let currentLikes = parseInt(countSpan.innerText);
        countSpan.innerText = heart.classList.contains('fas') ? currentLikes + 1 : currentLikes - 1;

        updateAnalytics(id, 'like');
    }

    async function handleShare(id, title) {
        const shareData = {
            title: title,
            text: `Read this: ${title}`,
            url: window.location.href
        };

        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title + " " + window.location.href)}`);
            }
        } catch (err) {
            console.log("Share failed", err);
        }
    }

    function updateAnalytics(id, type) {
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, type: type })
        });
    }

    window.onload = loadFeed;
</script>

</body>
</html>
