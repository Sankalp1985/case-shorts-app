<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShortsFeed | Premium Insights</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #e11d48; }
        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Smooth Snap Scrolling */
        .feed-container {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #000;
        }

        /* Image Section */
        .image-container {
            height: 60%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 70%, rgba(0,0,0,0.9) 100%);
        }

        /* Content Section */
        .content-container {
            height: 40%;
            background: #ffffff;
            color: #000;
            padding: 2rem 1.5rem;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            margin-top: -30px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }

        .action-bar {
            margin-top: auto;
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f0f0;
        }

        /* Glassmorphism Analytics */
        #analytics-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            padding: 2rem 1.5rem;
        }
        #analytics-panel.open { transform: translateY(0); }

        .trending-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Typography & Utility */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .scroll-thin::-webkit-scrollbar { width: 2px; }
        .scroll-thin::-webkit-scrollbar-thumb { background: #e5e5e5; }
    </style>
</head>

<body>

<div class="fixed top-0 w-full z-50 p-5 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
    <div class="text-xl font-extrabold tracking-tighter text-white uppercase italic">
        Case<span class="text-red-600">Shorts</span>
    </div>
    <button onclick="toggleAnalytics()" class="bg-white/10 hover:bg-white/20 backdrop-blur-lg border border-white/20 px-4 py-2 rounded-full flex items-center space-x-2 transition-all active:scale-95">
        <span class="flex h-2 w-2 rounded-full bg-red-600 animate-pulse"></span>
        <span class="text-[10px] font-black tracking-widest uppercase">Trending</span>
    </button>
</div>

<div class="feed-container" id="feed">
    <div class="h-full flex flex-col items-center justify-center space-y-4">
        <div class="w-10 h-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-[10px] font-bold tracking-[0.3em] text-gray-500 uppercase">Synchronizing Data</p>
    </div>
</div>

<div id="analytics-panel">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h2 class="text-3xl font-black italic tracking-tighter uppercase">Market <span class="text-red-600">Leaderboard</span></h2>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Real-time Engagement Metrics</p>
        </div>
        <button onclick="toggleAnalytics()" class="w-12 h-12 flex items-center justify-center rounded-full bg-white/10 text-white">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
    </div>
    <div id="stats-list" class="overflow-y-auto max-h-[70vh] pr-2 scroll-thin">
        </div>
</div>

<script>
/** * CONFIGURATION
 * Update SCRIPT_URL with your latest Google Apps Script deployment URL.
 */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwMenWKEzLlrJ5T-pjs8H8SKdMaQY9D98vFZQMAQSOkV7flfHi9lCIbbmt9spAHoDpYQQ/exec";
const API_KEY = "abc1991securekey";

// INITIAL LOAD
async function loadFeed() {
    try {
        const res = await fetch(SCRIPT_URL);
        const json = await res.json();

        if (json.success && json.data) {
            renderStories(json.data);
            initIntersectionObserver();
        } else {
            throw new Error(json.error || "Dataset empty");
        }
    } catch (err) {
        document.getElementById("feed").innerHTML = `
            <div class="h-full flex flex-col items-center justify-center p-10 text-center space-y-5">
                <div class="bg-red-600/10 p-5 rounded-full">
                    <i class="fa-solid fa-bolt-lightning text-3xl text-red-600"></i>
                </div>
                <div>
                    <h3 class="font-black uppercase tracking-widest text-sm">System Connection Error</h3>
                    <p class="text-[10px] text-gray-500 mt-2">${err.message}</p>
                </div>
                <button onclick="location.reload()" class="bg-white text-black px-8 py-3 rounded-full text-[10px] font-black tracking-widest uppercase hover:bg-red-600 hover:text-white transition-all">Retry Link</button>
            </div>`;
    }
}

// RENDER FEED
function renderStories(stories) {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    stories.forEach(story => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = story.id;

        // Note: Keys are lowercase because Apps Script maps them that way
        card.innerHTML = `
            <div class="image-container">
                <img src="${story.image_url || 'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000'}" alt="Visual" onerror="this.src='https://via.placeholder.com/800x1200?text=ShortsFeed+Content'">
                <div class="image-overlay"></div>
            </div>
            <div class="content-container">
                <div class="flex items-center space-x-2 mb-3">
                    <span class="bg-black text-white text-[8px] font-black px-2 py-1 rounded-sm tracking-[0.2em] uppercase">
                        ${story.category || 'Executive Summary'}
                    </span>
                    <span class="w-1 h-1 bg-red-600 rounded-full"></span>
                    <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Case #${story.id}</span>
                </div>
                
                <h2 class="text-2xl font-extrabold leading-[1.15] tracking-tight mb-4 text-gray-900 line-clamp-2">
                    ${story.title}
                </h2>
                
                <div class="text-gray-600 text-sm leading-relaxed overflow-y-auto pr-3 mb-6 h-36 scroll-thin">
                    ${story.content}
                </div>

                <div class="action-bar">
                    <div class="flex space-x-8">
                        <button onclick="handleLike('${story.id}')" class="flex flex-col items-center group">
                            <i id="icon-${story.id}" class="fa-regular fa-heart text-xl transition-all group-active:scale-150"></i>
                            <span class="text-[10px] font-bold mt-1 text-gray-400" id="count-${story.id}">${story.likes || 0}</span>
                        </button>
                        <button onclick="handleShare('${story.title}')" class="flex flex-col items-center group active:scale-90 transition-transform">
                            <i class="fa-brands fa-whatsapp text-2xl text-green-600"></i>
                            <span class="text-[10px] font-bold mt-1 text-gray-400 uppercase tracking-tighter">Forward</span>
                        </button>
                    </div>
                    <div class="bg-gray-100 p-2 rounded-lg">
                        <i class="fa-solid fa-qrcode text-gray-300 text-lg"></i>
                    </div>
                </div>
            </div>
        `;
        feed.appendChild(card);
    });
}

// ANALYTICS LOGIC
function initIntersectionObserver() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                sendInteraction(entry.target.dataset.id, "open");
            }
        });
    }, { threshold: 0.8 });

    document.querySelectorAll(".card").forEach(card => observer.observe(card));
}

function handleLike(id) {
    const icon = document.getElementById(`icon-${id}`);
    const countLabel = document.getElementById(`count-${id}`);
    
    if (!icon.classList.contains('fa-solid')) {
        icon.classList.remove('fa-regular');
        icon.classList.add('fa-solid', 'text-red-600');
        countLabel.innerText = parseInt(countLabel.innerText) + 1;
        sendInteraction(id, "like");
    }
}

async function sendInteraction(id, type) {
    // Mode: "no-cors" is used to prevent pre-flight errors with Google Apps Script POST
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, type: type, apiKey: API_KEY })
    });
}

// UI PANEL LOGIC
function toggleAnalytics() {
    const panel = document.getElementById("analytics-panel");
    panel.classList.toggle("open");
    if (panel.classList.contains("open")) fetchLeaderboard();
}

async function fetchLeaderboard() {
    const box = document.getElementById("stats-list");
    box.innerHTML = `<div class="p-10 text-center animate-pulse text-xs font-bold tracking-widest text-gray-600 uppercase">Aggregating Metrics...</div>`;

    try {
        const res = await fetch(`${SCRIPT_URL}?action=getStats`);
        const json = await res.json();
        
        if (json.success && json.data) {
            box.innerHTML = json.data.map((item, index) => `
                <div class="trending-card">
                    <div class="flex items-center space-x-4">
                        <span class="text-2xl font-black italic text-red-600 opacity-50">0${index + 1}</span>
                        <div>
                            <div class="text-sm font-bold text-white line-clamp-1">${item.title}</div>
                            <div class="text-[8px] text-gray-500 uppercase tracking-widest">UID: ${item.id}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs font-black text-white">${item.opens || 0}</div>
                        <div class="text-[8px] text-gray-500 uppercase font-bold">Impressions</div>
                    </div>
                </div>
            `).join("");
        }
    } catch {
        box.innerHTML = `<p class="text-center text-red-600 text-[10px] font-bold uppercase mt-10">Sync Failed. Verify Script Deployment.</p>`;
    }
}

function handleShare(title) {
    const url = window.location.href;
    const text = encodeURIComponent(`💡 Insight: ${title}\n\nRead the full breakdown on CaseShorts:\n${url}`);
    window.open(`https://api.whatsapp.com/send?text=${text}`);
}

window.onload = loadFeed;
</script>

</body>
</html>
